<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-AI Cloud 🕸️</title>
    <style>
        /* Estilo Temático do Homem-Aranha */
        body { background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 450px; height: 650px; background: #fff; border: 5px solid #e23636; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px rgba(226, 54, 54, 0.6); }
        header { background: #e23636; color: white; padding: 20px; text-align: center; border-bottom: 3px solid #005a9c; }
        header h1 { margin: 0; font-size: 1.5em; text-transform: uppercase; letter-spacing: 2px; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: #f0f0f0; display: flex; flex-direction: column; gap: 15px; }
        
        /* Balões de Mensagem */
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 0.95em; line-height: 1.4; position: relative; }
        .user { background: #005a9c; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #e23636; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        /* Área de Input */
        #input-area { display: flex; padding: 15px; background: #fff; border-top: 2px solid #ddd; }
        input { flex: 1; padding: 12px; border: 2px solid #005a9c; border-radius: 8px; outline: none; font-size: 1em; }
        button { background: #e23636; color: white; border: none; padding: 0 20px; margin-left: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #005a9c; transform: scale(1.05); }
        
        /* Indicador de Carregamento */
        #loading { font-size: 0.8em; font-style: italic; color: #666; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div id="chat-container">
        <header>
            <h1>🕸️ Spider-AI Chat</h1>
            <p style="margin: 5px 0 0; font-size: 0.8em;">Conectado à Nuvem (2026)</p>
        </header>
        
        <div id="messages">
            <!-- As mensagens aparecerão aqui -->
            <div class="msg ai">E aí, amigão da vizinhança! Como posso ajudar na patrulha hoje?</div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Diga algo ao Aranha..." onkeypress="if(event.key === 'Enter') enviarMensagem()">
            <button onclick="enviarMensagem()">ENVIAR</button>
        </div>
        <div id="loading-text" style="text-align: center; padding-bottom: 10px; display: none; color: #e23636; font-weight: bold;">
            🕸️ O Aranha está pensando...
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO GLOBAL ---
        // COLE AQUI A URL QUE O RENDER TE DEU (Ex: https://meu-agente.onrender.com)
        const URL_API = "https://SEU-LINK-DO-RENDER-AQUI.onrender.com/api/chat";

        async function enviarMensagem() {
            const input = document.getElementById('user-input');
            const msgDiv = document.getElementById('messages');
            const loadingText = document.getElementById('loading-text');
            const texto = input.value.trim();

            if (!texto) return;

            // 1. Mostrar mensagem do usuário
            msgDiv.innerHTML += `<div class="msg user">${texto}</div>`;
            input.value = '';
            msgDiv.scrollTop = msgDiv.scrollHeight;

            // 2. Mostrar carregamento
            loadingText.style.display = 'block';

            try {
                // 3. Chamar o seu Back-end na Nuvem (Fetch API)
                const response = await fetch(URL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pergunta: texto }) // Usando 'pergunta' como no server.js
                });

                const data = await response.json();

                // 4. Exibir a resposta da IA (do campo 'resposta' vindo do server.js)
                loadingText.style.display = 'none';
                
                if (data.sucesso) {
                    msgDiv.innerHTML += `<div class="msg ai"><b>Aranha:</b> ${data.resposta}</div>`;
                } else {
                    msgDiv.innerHTML += `<div class="msg ai" style="background: #555;"><b>Erro:</b> ${data.erro}</div>`;
                }

            } catch (error) {
                loadingText.style.display = 'none';
                console.error("Erro de conexão:", error);
                msgDiv.innerHTML += `<div class="msg ai" style="background: #555;"><b>Sentido Aranha avisou:</b> Não consegui conectar ao servidor na nuvem! ❌</div>`;
            }

            msgDiv.scrollTop = msgDiv.scrollHeight;
        }
    </script>
</body>
</html>
